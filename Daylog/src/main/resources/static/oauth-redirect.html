<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 테마 컬러를 크림 아이보리 톤으로 변경 -->
    <meta name="theme-color" content="#fdfbf7">
    <title>로그인 처리중 — Our Memory</title>
    <!-- 감성 폰트 링크 추가 -->
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            /* 차분한 웜톤 컬러 팔레트 */
            --primary: #b08968;       /* 카라멜 브라운 */
            --primary-light: #e6ccb2; /* 부드러운 베이지 */
            --primary-dark: #9c6644;  /* 딥 브라운 */
            --bg-color: #fdfbf7;      /* 포근한 크림 아이보리 */

            --gray-100: #f3f0ec;
            --gray-200: #e5e0d8;
            --gray-500: #7a756e;
            --gray-700: #45413c;
            --gray-900: #1c1a18;
            --white: #ffffff;

            --radius-xl: 20px;
            /* 은은한 브라운 그림자 */
            --shadow-lg: 0 10px 30px rgba(139, 115, 85, 0.12), 0 4px 12px rgba(139, 115, 85, 0.08);
            --font-main: 'Noto Sans KR', sans-serif;
        }

        html, body { height: 100%; font-family: var(--font-main); }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background-color: var(--bg-color);
            position: relative;
            overflow: hidden;
        }

        /* 아늑한 베이지 글로우 배경 장식 */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(230, 204, 178, 0.3);
            filter: blur(45px);
            pointer-events: none;
        }
        body::before { width: 320px; height: 320px; top: -120px; right: -100px; }
        body::after  { width: 260px; height: 260px; bottom: -110px; left: -90px; }

        .loading-container {
            position: relative;
            z-index: 1;
            background: var(--white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--gray-100);
            padding: 44px 40px;
            text-align: center;
            width: 100%;
            max-width: 340px;
            animation: cardIn 0.45s cubic-bezier(0.32, 0.72, 0, 1);
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .brand-logo {
            width: 58px; height: 58px; margin: 0 auto 18px;
            border-radius: 18px;
            background: var(--gray-100);
            border: 1px solid var(--gray-200);
            display: flex; align-items: center; justify-content: center;
            font-size: 26px;
            box-shadow: 0 4px 10px rgba(139, 115, 85, 0.05);
        }

        .loading-text {
            font-size: 17px;
            font-weight: 500;
            color: var(--gray-900);
            margin-bottom: 24px;
            white-space: nowrap;
            letter-spacing: -0.3px;
        }

        /* 웜톤 브라운 스피너 */
        .spinner {
            width: 40px; height: 40px; margin: 0 auto;
            border: 3.5px solid var(--primary-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-subtext {
            margin-top: 24px;
            font-size: 13.5px;
            color: var(--gray-500);
        }

        .dots { display: inline-block; width: 1.4em; text-align: left; }
        .dots::after { content: ''; animation: dots 1.5s steps(4, end) infinite; }
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        @media (prefers-reduced-motion: reduce) {
            .loading-container { animation: none; }
            .spinner { animation-duration: 1.8s; }
        }
    </style>
</head>
<body>
<div class="loading-container">
    <!-- 로고 이모지를 웜톤 하트로 변경 -->
    <div class="brand-logo">👾</div>
    <div class="loading-text">로그인 중입니다<span class="dots"></span></div>
    <div class="spinner"></div>
    <div class="loading-subtext">잠시만 기다려 주세요</div>
</div>

<script src="config.js?v=1.0.0"></script>
<script>
    // ⚙️ 백엔드 서버 주소 (기존 로직 완전 유지)
    const BACKEND_BASE = (window.APP_CONFIG && window.APP_CONFIG.BACKEND_BASE);
    const SUCCESS_REDIRECT = 'main.html';
    const LOGIN_PAGE = 'login.html';

    document.addEventListener('DOMContentLoaded', async function () {
        const params = new URLSearchParams(window.location.search);

        // ── 방법 2: 백엔드 성공 핸들러가 ?token=... 으로 보낸 경우 ──
        const tokenParam = params.get('token') || params.get('accessToken');
        if (tokenParam) {
            localStorage.clear();
            localStorage.setItem('accessToken', tokenParam);
            window.location.href = SUCCESS_REDIRECT;
            return;
        }

        // ── 방법 1: ?code=... 로 인가코드가 온 경우 ──
        const code = params.get('code');
        const stateProvider = (params.get('state') || '').split('__')[0];
        const provider = stateProvider || sessionStorage.getItem('provider') || params.get('provider');

        if (!code) {
            alert('인가 코드가 존재하지 않습니다.');
            window.location.href = LOGIN_PAGE;
            return;
        }
        if (!provider) {
            alert('소셜 제공자 정보를 찾을 수 없습니다.');
            window.location.href = LOGIN_PAGE;
            return;
        }

        const endpoints = {
            kakao:  `${BACKEND_BASE}/user/oauth2/code/kakao`,
            naver:  `${BACKEND_BASE}/user/oauth2/code/naver`,
            google: `${BACKEND_BASE}/user/oauth2/code/google`
        };
        const endpoint = endpoints[provider];
        if (!endpoint) {
            alert('지원하지 않는 소셜 로그인입니다.');
            window.location.href = LOGIN_PAGE;
            return;
        }

        try {
            const response = await fetch(`${endpoint}?code=${encodeURIComponent(code)}`, {
                method: 'GET'
            });

            if (!response.ok) {
                let msg = '로그인 처리 실패';
                try { const e = await response.json(); msg = e.message || msg; } catch (_) {}
                alert(msg);
                window.location.href = LOGIN_PAGE;
                return;
            }

            const data = await response.json();

            localStorage.clear();

            // 데이터 키 네임셋을 고정하여 저장 (main.js 로그아웃 시 일괄 삭제 대상)
            const token = data.token || data.accessToken || data.jwt || '';
            if (token) localStorage.setItem('accessToken', token);
            if (data.user) localStorage.setItem('currentUser', JSON.stringify(data.user));
            localStorage.setItem('auth', JSON.stringify(data));

            sessionStorage.removeItem('provider');

            window.location.href = SUCCESS_REDIRECT;
        } catch (error) {
            console.error('OAuth 로그인 처리 오류:', error);
            alert('로그인 처리 중 오류가 발생했습니다.');
            window.location.href = LOGIN_PAGE;
        }
    });
</script>
</body>
</html>
